name: MCP client compatibility
description: Report install or compatibility notes for a public MCP client.
title: "[Client]: "
labels: ["client-compatibility"]
body:
  - type: dropdown
    id: client
    attributes:
      label: Client
      options:
        - Claude Desktop
        - Claude Code
        - ChatGPT
        - Codex
        - Cursor
        - Cline
        - VS Code
        - Windsurf
        - n8n
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the public client behavior. Do not include tokens, private URLs, or customer data.
    validations:
      required: true
  - type: input
    id: docs
    attributes:
      label: Relevant public docs link
      placeholder: https://...

