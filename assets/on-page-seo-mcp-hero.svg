  <g transform="translate(710 96)" filter="url(#softShadow)">
    <rect width="392" height="438" rx="24" fill="#fbfaf9"/>
    <rect x="24" y="24" width="344" height="54" rx="14" fill="#111827"/>
    <circle cx="54" cy="51" r="8" fill="#22c55e"/>
    <circle cx="82" cy="51" r="8" fill="#f9b233"/>
