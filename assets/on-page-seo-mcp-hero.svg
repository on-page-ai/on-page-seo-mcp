      <text x="0" y="72" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">keyword: "target keyword"</text>
      <text x="0" y="99" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">url: https://example.com/page</text>
    </g>

