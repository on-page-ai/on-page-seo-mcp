      <text x="18" y="27" fill="#223248" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Entity gaps</text>
      <text x="242" y="27" fill="#455dd3" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">12</text>

      <rect y="56" width="328" height="42" rx="10" fill="#fff7ed"/>
      <text x="18" y="83" fill="#223248" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700">Competitor patterns</text>
      <text x="242" y="83" fill="#d97706" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700">SERP</text>

