    <path d="M0 230H1200" stroke="#ffffff"/>
    <path d="M0 350H1200" stroke="#ffffff"/>
    <path d="M0 470H1200" stroke="#ffffff"/>
    <path d="M190 0V630" stroke="#ffffff"/>
    <path d="M390 0V630" stroke="#ffffff"/>
    <path d="M590 0V630" stroke="#ffffff"/>
    <path d="M790 0V630" stroke="#ffffff"/>
    <path d="M990 0V630" stroke="#ffffff"/>
  </g>

  <g transform="translate(88 80)">
    <g transform="translate(0 6)">
      <rect x="0" y="23" width="9" height="24" rx="2" fill="#5570e8"/>
      <rect x="14" y="10" width="9" height="37" rx="2" fill="#7b91ff"/>
