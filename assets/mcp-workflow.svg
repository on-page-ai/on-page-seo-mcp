<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">On-Page.ai MCP workflow</title>
  <desc id="desc">A workflow diagram showing an AI client calling the On-Page.ai MCP server, running an SEO scan, and returning evidence-backed recommendations.</desc>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#fbfaf9"/>

  <text x="72" y="76" fill="#191918" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="34" font-weight="800" letter-spacing="-0.8">
    From prompt to evidence-backed SEO action
  </text>
  <text x="72" y="112" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18" font-weight="500">
    The hosted MCP server gives AI clients structured scan data before they recommend edits.
  </text>

  <g transform="translate(72 166)" filter="url(#shadow)">
    <rect width="220" height="132" rx="18" fill="#ffffff" stroke="#e7e2d9"/>
    <text x="24" y="40" fill="#455dd3" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="800">01</text>
    <text x="24" y="72" fill="#191918" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="800">AI client</text>
    <text x="24" y="101" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">Claude, ChatGPT,</text>
    <text x="24" y="123" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">Codex, Cursor</text>
  </g>

  <path d="M318 232H404" stroke="#a7b3ff" stroke-width="4" stroke-linecap="round"/>
  <path d="M394 218L410 232L394 246" fill="none" stroke="#a7b3ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(430 166)" filter="url(#shadow)">
    <rect width="250" height="132" rx="18" fill="#111827"/>
    <text x="24" y="40" fill="#f9b233" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="800">02</text>
    <text x="24" y="72" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="800">On-Page.ai MCP</text>
    <text x="24" y="101" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">Hosted server URL</text>
    <text x="24" y="123" fill="#cbd5e1" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">api.on-page.ai/mcp</text>
  </g>

  <path d="M706 232H792" stroke="#a7b3ff" stroke-width="4" stroke-linecap="round"/>
  <path d="M782 218L798 232L782 246" fill="none" stroke="#a7b3ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(818 166)" filter="url(#shadow)">
    <rect width="310" height="132" rx="18" fill="#ffffff" stroke="#e7e2d9"/>
    <text x="24" y="40" fill="#455dd3" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="800">03</text>
    <text x="24" y="72" fill="#191918" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="800">Structured report</text>
    <text x="24" y="101" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">Entities, competitors, links,</text>
    <text x="24" y="123" fill="#5f5c56" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15">page experience, next steps</text>
  </g>

  <g transform="translate(72 338)">
    <rect width="148" height="36" rx="18" fill="#eef2ff"/>
    <text x="24" y="24" fill="#455dd3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">scan_page</text>

    <rect x="164" width="174" height="36" rx="18" fill="#eef2ff"/>
    <text x="188" y="24" fill="#455dd3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">scan_page_lite</text>

    <rect x="354" width="182" height="36" rx="18" fill="#eef2ff"/>
    <text x="378" y="24" fill="#455dd3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">scan_page_deep</text>

    <rect x="552" width="150" height="36" rx="18" fill="#eef2ff"/>
    <text x="576" y="24" fill="#455dd3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">classify_text</text>

    <rect x="718" width="136" height="36" rx="18" fill="#eef2ff"/>
    <text x="742" y="24" fill="#455dd3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">wait_for_job</text>

    <rect x="870" width="142" height="36" rx="18" fill="#eef2ff"/>
    <text x="894" y="24" fill="#455dd3" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="800">check_credits</text>
  </g>
</svg>
